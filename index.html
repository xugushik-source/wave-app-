<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0E0E0D">
<title>Волна</title>

<style>
:root{
  --bg:#0E0E0D;
  --bg2:#15130F;
  --card:#181714;
  --card2:#222019;
  --line:#343025;
  --accent:#D6C3A3;
  --accent2:#B89E73;
  --text:#EFEAE0;
  --muted:#B8AB95;
  --soft:#746B5B;
  --danger:#E3837A;
  --green:#97BF86;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  margin:0;
  min-height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter","Segoe UI",Arial,sans-serif;
}
body{
  background:
    radial-gradient(circle at 14% 4%, rgba(214,195,163,.15), transparent 35%),
    radial-gradient(circle at 88% 92%, rgba(184,158,115,.08), transparent 42%),
    linear-gradient(180deg,#0E0E0D 0%,#12100D 100%);
}
button,input{font-family:inherit}
button{cursor:pointer;touch-action:manipulation}
#app{
  width:100%;
  max-width:430px;
  min-height:100dvh;
  margin:0 auto;
}
.screen{
  width:100%;
  min-height:100dvh;
  padding:calc(28px + env(safe-area-inset-top)) 24px calc(26px + env(safe-area-inset-bottom));
  display:flex;
  flex-direction:column;
  animation:fadeIn .25s ease both;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:28px;
}
.brand{
  display:flex;
  align-items:center;
  gap:12px;
}
.logo{
  width:44px;height:44px;border-radius:16px;
  background:linear-gradient(145deg,#1B1915,#0C0C0B);
  border:1px solid rgba(214,195,163,.18);
  display:flex;align-items:center;justify-content:center;
  color:var(--accent);
  box-shadow:0 16px 44px rgba(0,0,0,.25);
}
.logo svg{width:30px;height:30px}
.brandName{
  font-size:15px;
  letter-spacing:2.8px;
  text-transform:uppercase;
  color:var(--accent);
}
.brandSub{
  font-size:11px;
  color:var(--soft);
  margin-top:2px;
}
.iconBtn{
  width:44px;height:44px;border-radius:16px;
  border:1px solid var(--line);
  background:rgba(25,24,20,.72);
  color:var(--muted);
  font-size:18px;
}
.back{
  width:44px;height:44px;border-radius:16px;
  border:1px solid var(--line);
  background:rgba(25,24,20,.72);
  color:var(--muted);
  font-size:24px;
  margin-bottom:26px;
}
.hero{
  margin-top:auto;
  margin-bottom:34px;
}
.title{
  font-size:38px;
  line-height:1.06;
  font-weight:780;
  letter-spacing:-.9px;
  margin:0 0 14px;
}
.subtitle{
  color:var(--muted);
  font-size:17px;
  line-height:1.6;
  margin:0;
}
.card{
  background:linear-gradient(180deg,rgba(29,28,23,.95),rgba(18,17,15,.95));
  border:1px solid rgba(214,195,163,.12);
  border-radius:28px;
  padding:18px;
  box-shadow:0 24px 70px rgba(0,0,0,.24);
}
.btn{
  width:100%;
  min-height:62px;
  border:0;
  border-radius:20px;
  padding:16px 18px;
  background:rgba(34,32,26,.9);
  color:var(--text);
  font-size:17px;
  font-weight:680;
  margin-bottom:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  transition:transform .12s ease, opacity .12s ease;
}
.btn:active{transform:scale(.982)}
.btnPrimary{
  background:linear-gradient(180deg,#E0CEB1,#C9B18A);
  color:#15120E;
  box-shadow:0 12px 32px rgba(214,195,163,.12);
}
.btnDanger{
  background:rgba(49,30,28,.9);
  color:#F1978E;
  border:1px solid rgba(227,131,122,.22);
}
.btnGhost{
  background:transparent;
  color:var(--soft);
  border:1px solid var(--line);
  min-height:50px;
  font-size:14px;
}
.sectionLabel{
  color:var(--soft);
  font-size:12px;
  letter-spacing:1.4px;
  text-transform:uppercase;
  margin:0 0 12px 4px;
}
.scenarioBtn{
  justify-content:flex-start;
  text-align:left;
}
.pillIcon{
  width:34px;height:34px;border-radius:13px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(214,195,163,.12);
  color:var(--accent);
  flex:0 0 auto;
}
.btnPrimary .pillIcon{background:rgba(14,14,13,.12);color:#15120E}
.small{
  color:var(--soft);
  font-size:13px;
  text-align:center;
  line-height:1.55;
  margin:18px 6px 0;
}
.badge{
  display:inline-flex;
  width:max-content;
  padding:8px 12px;
  border-radius:999px;
  background:rgba(151,191,134,.12);
  color:var(--green);
  font-size:12px;
  margin-bottom:16px;
}
.stat{
  background:rgba(25,24,20,.86);
  border:1px solid rgba(214,195,163,.08);
  border-radius:20px;
  padding:17px 18px;
  margin-bottom:12px;
}
.statLabel{
  color:var(--soft);
  font-size:11px;
  letter-spacing:1.1px;
  text-transform:uppercase;
  margin-bottom:7px;
}
.statValue{
  color:var(--accent);
  font-size:22px;
  font-weight:760;
}
.playerCard{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
}
.breatheCircle{
  width:190px;height:190px;border-radius:50%;
  margin:8px auto 28px;
  background:radial-gradient(circle,rgba(214,195,163,.16),rgba(214,195,163,.04) 58%,transparent 72%);
  animation:breathe 4.6s ease-in-out infinite;
}
@keyframes breathe{
  0%,100%{transform:scale(.88);opacity:.55}
  50%{transform:scale(1.12);opacity:1}
}
.progress{
  height:5px;
  background:#292722;
  border-radius:99px;
  overflow:hidden;
  margin:20px 0 0;
}
.fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--accent2),var(--accent));
  border-radius:99px;
  transition:width .35s ease;
}
.currentText{
  min-height:118px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-size:23px;
  line-height:1.45;
  color:var(--accent);
  letter-spacing:-.3px;
  animation:lineFade .28s ease both;
}
@keyframes lineFade{from{opacity:.2;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.playerTitle{
  color:var(--text);
  font-size:21px;
  font-weight:740;
  margin-bottom:8px;
}
.status{
  color:var(--soft);
  font-size:13px;
}
.timerNum{
  font-size:74px;
  font-weight:230;
  letter-spacing:3px;
  color:var(--accent);
  text-align:center;
  margin:26px 0 12px;
}
.exerciseStep{
  min-height:300px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-size:25px;
  line-height:1.45;
  color:var(--accent);
}
.footerSpace{margin-top:auto}
</style>
</head>

<body>
<div id="app"></div>

<script>
const STORAGE_KEY = "volna_final_stats_v1";

let state = {
  screen: "home",
  currentScenario: null,
  playing: false,
  currentAudio: null,
  timer: null,
  timerSeconds: 1200,
  exerciseIndex: 0
};

const scenarioData = {
  no_reply: {
    title: "Он / она не отвечает",
    icon: "…",
    files: [
      ["anger_01.m4a","Слушай… я понимаю, что тебя сейчас накрывает."],
      ["anger_02.m4a","Кажется, что тебя игнорируют."],
      ["anger_03.m4a","Кажется, что сейчас всё рушится."],
      ["anger_04.m4a","Но давай честно… ты не знаешь, что происходит на той стороне."],
      ["anger_05.m4a","Сейчас это чувство. Не факт."],
      ["anger_06.m4a","Ты уже был в этом состоянии."],
      ["abandon_09.m4a","И каждый раз оно проходило."],
      ["abandon_07.m4a","Не пиши сейчас."],
      ["noanswer_02.m4a","Дай этому двадцать минут."],
      ["abandon_08.m4a","Я рядом."],
      ["anger_07.m4a","Просто переждём это."]
    ]
  },
  want_write: {
    title: "Хочу написать сейчас",
    icon: "✉",
    files: [
      ["anger_08.m4a","Стоп."],
      ["abandon_01.m4a","Сейчас не тот момент, когда стоит писать."],
      ["abandon_02.m4a","Ты не хочешь решить проблему."],
      ["abandon_03.m4a","Ты хочешь сбросить напряжение."],
      ["abandon_04.m4a","И это нормально."],
      ["abandon_05.m4a","Но если написать сейчас, может стать хуже."],
      ["abandon_06.m4a","Ты это знаешь."],
      ["abandon_07.m4a","Отложи телефон. Не пиши. Не звони."],
      ["noanswer_01.m4a","Не навсегда."],
      ["noanswer_02.m4a","Просто на двадцать минут."]
    ]
  },
  not_loved: {
    title: "Меня не любят",
    icon: "♡",
    files: [
      ["noanswer_03.m4a","Это чувство очень реальное."],
      ["noanswer_04.m4a","Я понимаю."],
      ["noanswer_05.m4a","Но это не значит, что тебя не любят."],
      ["noanswer_06.m4a","Это значит, что тебе сейчас больно."],
      ["noanswer_07.m4a","И страшно."],
      ["empty_01.m4a","Твой мозг пытается объяснить это самым простым способом."],
      ["empty_02.m4a","Но это не вся картина."],
      ["empty_03.m4a","С тобой не что-то не так."],
      ["empty_04.m4a","Ты просто сейчас в тяжёлом состоянии."],
      ["empty_05.m4a","Оно пройдёт."]
    ]
  },
  anger: {
    title: "Злость",
    icon: "!",
    files: [
      ["empty_06.m4a","Я вижу, как тебя сейчас злит."],
      ["write_01.m4a","И это нормально."],
      ["write_02.m4a","Злость не делает тебя плохим."],
      ["write_03.m4a","Она просто очень сильная."],
      ["write_04.m4a","Но если действовать сейчас…"],
      ["write_05.m4a","Ты можешь разрушить то, что потом захочешь вернуть."],
      ["write_06.m4a","Давай не решать ничего сейчас."],
      ["write_07.m4a","Просто переживём пик."]
    ]
  },
  abandon: {
    title: "Страх, что меня бросят",
    icon: "↯",
    files: [
      ["write_08.m4a","Сейчас тебе кажется, что это конец."],
      ["write_09.m4a","Что тебя бросят."],
      ["write_10.m4a","Что ты останешься один."],
      ["write_11.m4a","Это очень сильное чувство."],
      ["write_12.m4a","Я понимаю."],
      ["write_13.m4a","Но оно сейчас громче реальности."],
      ["write_14.m4a","Прямо сейчас ты здесь."]
    ]
  },
  empty: {
    title: "Внутри пусто",
    icon: "○",
    files: [
      ["write_15.m4a","Сейчас внутри может быть пусто."],
      ["write_16.m4a","Как будто ничего нет."],
      ["write_17.m4a","Но это не ты."],
      ["write_18.m4a","Это состояние."],
      ["write_19.m4a","Оно приходит."],
      ["write_20.m4a","И оно уходит."]
    ]
  }
};

const exerciseSteps = [
  "Сделай медленный вдох на 4 счёта.",
  "Задержи дыхание на 4 счёта.",
  "Выдыхай медленно на 6 счётов.",
  "Повтори это ещё раз.",
  "Теперь назови 5 вещей, которые видишь вокруг.",
  "Назови 4 вещи, которые можешь потрогать.",
  "Назови 3 звука, которые слышишь.",
  "Ты здесь. Этого сейчас достаточно."
];

function loadStats(){
  try{
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {events:[]};
  }catch(e){
    return {events:[]};
  }
}

function saveStats(stats){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(stats));
}

function addEvent(type, scenario){
  const stats = loadStats();
  stats.events.push({type, scenario, ts: Date.now()});
  saveStats(stats);
}

function todayWaves(){
  const today = new Date().toDateString();
  return loadStats().events.filter(e => e.type === "completed" && new Date(e.ts).toDateString() === today).length;
}

function weekWaves(){
  const week = Date.now() - 7*24*3600*1000;
  return loadStats().events.filter(e => e.type === "completed" && e.ts > week).length;
}

function topTrigger(){
  const map = {};
  loadStats().events.filter(e => e.scenario).forEach(e => map[e.scenario] = (map[e.scenario] || 0) + 1);
  const top = Object.entries(map).sort((a,b)=>b[1]-a[1])[0];
  return top ? scenarioData[top[0]].title : "Пока нет данных";
}

function peakHour(){
  const map = {};
  loadStats().events.forEach(e => {
    const h = new Date(e.ts).getHours();
    map[h] = (map[h] || 0) + 1;
  });
  const top = Object.entries(map).sort((a,b)=>b[1]-a[1])[0];
  return top ? top[0] + ":00" : "Пока нет данных";
}

function logo(){
  return `<div class="logo"><svg viewBox="0 0 100 100" fill="none"><path d="M24 58C34 68 45 69 57 58C67 49 74 47 82 55" stroke="currentColor" stroke-width="6" stroke-linecap="round"/><path d="M72 26C58 18 38 21 28 34C16 50 23 70 42 70" stroke="currentColor" stroke-width="5" stroke-linecap="round"/></svg></div>`;
}

function shell(content){
  document.getElementById("app").innerHTML = `<div class="screen">${content}</div>`;
}

function topBar(settings=true){
  return `<div class="top"><div class="brand">${logo()}<div><div class="brandName">Волна</div><div class="brandSub">пауза между эмоцией и действием</div></div></div>${settings?`<button class="iconBtn" onclick="renderStats()">↗</button>`:""}</div>`;
}

function renderHome(){
  stopAll();
  shell(`
    ${topBar()}
    ${todayWaves()>0 ? `<div class="badge">Сегодня пережито волн: ${todayWaves()}</div>` : ""}
    <div class="hero">
      <h1 class="title">Как ты сейчас?</h1>
      <p class="subtitle">Тебе не нужно разбирать всю жизнь. Нужно пройти ближайшие несколько минут.</p>
    </div>
    <div class="card">
      <button class="btn btnDanger" onclick="renderTriggers()">Мне сейчас плохо</button>
      <button class="btn" onclick="renderStats()">Я стабилен</button>
    </div>
    <div class="footerSpace"></div>
    <div class="small">Ты не обязан справляться идеально. Достаточно не сделать хуже.</div>
  `);
}

function renderTriggers(){
  shell(`
    <button class="back" onclick="renderHome()">←</button>
    <div class="hero" style="margin-top:0">
      <h1 class="title">Что именно?</h1>
      <p class="subtitle">Выбери ближайшую ситуацию. Голос поведёт тебя дальше.</p>
    </div>
    <div class="card">
      ${Object.keys(scenarioData).map((key,idx)=>`
        <button class="btn scenarioBtn ${idx===0?'btnPrimary':''}" onclick="startScenario('${key}')">
          <span class="pillIcon">${scenarioData[key].icon}</span>
          <span>${scenarioData[key].title}</span>
        </button>
      `).join("")}
    </div>
  `);
}

async function startScenario(key){
  stopAll();
  state.currentScenario = key;
  state.playing = true;
  addEvent("started", key);
  const scenario = scenarioData[key];

  shell(`
    <button class="back" onclick="renderTriggers()">←</button>
    <div class="playerCard">
      <div style="text-align:center;margin-bottom:22px">
        <div class="playerTitle">${scenario.title}</div>
        <div class="status" id="status">Запускаю голос...</div>
      </div>
      <div class="breatheCircle"></div>
      <div class="currentText" id="currentText"></div>
      <div class="progress"><div class="fill" id="fill"></div></div>
    </div>
    <button class="btn btnGhost" onclick="stopAll();renderTriggers()">Остановить</button>
  `);

  for(let i=0;i<scenario.files.length;i++){
    if(!state.playing) break;
    const [file,text] = scenario.files[i];

    document.getElementById("status").innerText = `Фраза ${i+1} из ${scenario.files.length}`;
    document.getElementById("currentText").innerText = text;
    document.getElementById("fill").style.width = (((i+1)/scenario.files.length)*100) + "%";

    state.currentAudio = new Audio(file);
    await new Promise(resolve=>{
      state.currentAudio.onended = resolve;
      state.currentAudio.onerror = resolve;
      state.currentAudio.play().catch(resolve);
    });

    await new Promise(r=>setTimeout(r,650));
  }

  if(state.playing){
    addEvent("completed", key);
    renderAfterScenario();
  }
}

function renderAfterScenario(){
  shell(`
    ${topBar(false)}
    <div class="hero">
      <h1 class="title">Ты пережил волну</h1>
      <p class="subtitle">Ты не обязан решать всё сейчас. Сначала дай телу остыть.</p>
    </div>
    <div class="card">
      <button class="btn btnPrimary" onclick="startTimer()">Начать паузу 20 минут</button>
      <button class="btn" onclick="renderExercise()">Сделать короткое упражнение</button>
      <button class="btn btnGhost" onclick="renderHome()">На главный экран</button>
    </div>
    <div class="small">Ты не написал в импульсе. Ты не разрушил момент. Ты дал себе паузу.</div>
  `);
}

function startTimer(){
  stopAll();
  state.timerSeconds = 20*60;
  renderTimer();

  state.timer = setInterval(()=>{
    state.timerSeconds--;
    const el = document.getElementById("timerNum");
    if(el) el.innerText = formatTime(state.timerSeconds);
    if(state.timerSeconds <= 0){
      clearInterval(state.timer);
      addEvent("timer_done", state.currentScenario);
      renderTimerDone();
    }
  },1000);
}

function formatTime(seconds){
  const m = String(Math.floor(seconds/60)).padStart(2,"0");
  const s = String(seconds%60).padStart(2,"0");
  return `${m}:${s}`;
}

function renderTimer(){
  shell(`
    ${topBar(false)}
    <div class="playerCard">
      <div class="breatheCircle"></div>
      <div class="timerNum" id="timerNum">${formatTime(state.timerSeconds)}</div>
      <p class="subtitle" style="text-align:center">Просто подожди. Ничего не решаем прямо сейчас.</p>
    </div>
    <button class="btn" onclick="renderExercise()">Всё ещё тяжело</button>
    <button class="btn btnGhost" onclick="stopAll();renderHome()">Закончить</button>
  `);
}

function renderTimerDone(){
  shell(`
    ${topBar(false)}
    <div class="hero">
      <h1 class="title">Стало тише</h1>
      <p class="subtitle">Ты выдержал 20 минут. Это уже действие, а не слабость.</p>
    </div>
    <div class="card">
      <button class="btn btnPrimary" onclick="renderHome()">Вернуться домой</button>
      <button class="btn" onclick="renderStats()">Посмотреть статистику</button>
    </div>
  `);
}

function renderExercise(){
  stopAll();
  state.exerciseIndex = 0;
  renderExerciseStep();
}

function renderExerciseStep(){
  const i = state.exerciseIndex;
  shell(`
    <button class="back" onclick="renderHome()">←</button>
    <div class="progress"><div class="fill" style="width:${((i+1)/exerciseSteps.length)*100}%"></div></div>
    <div class="exerciseStep">${exerciseSteps[i]}</div>
    <button class="btn btnPrimary" onclick="nextExercise()">${i === exerciseSteps.length-1 ? "Готово" : "Дальше"}</button>
  `);
}

function nextExercise(){
  if(state.exerciseIndex >= exerciseSteps.length-1){
    addEvent("exercise_done", state.currentScenario);
    renderAfterScenario();
  }else{
    state.exerciseIndex++;
    renderExerciseStep();
  }
}

function renderStats(){
  stopAll();
  shell(`
    <button class="back" onclick="renderHome()">←</button>
    <div class="hero" style="margin-top:0">
      <h1 class="title">Ты здесь</h1>
      <p class="subtitle">Стабильные моменты тоже важны. Ты не только кризис.</p>
    </div>
    <div class="stat"><div class="statLabel">Сегодня пережито волн</div><div class="statValue">${todayWaves()}</div></div>
    <div class="stat"><div class="statLabel">Волн за неделю</div><div class="statValue">${weekWaves()}</div></div>
    <div class="stat"><div class="statLabel">Самый частый триггер</div><div class="statValue" style="font-size:17px">${topTrigger()}</div></div>
    <div class="stat"><div class="statLabel">Чаще всего накрывает</div><div class="statValue" style="font-size:17px">${peakHour()}</div></div>
    <div class="stat"><div class="statLabel">Лучшее действие</div><div class="statValue" style="font-size:17px">Пауза 20 минут</div></div>
    <button class="btn btnGhost" onclick="resetStats()">Сбросить статистику</button>
  `);
}

function resetStats(){
  localStorage.removeItem(STORAGE_KEY);
  renderStats();
}

function stopAll(){
  state.playing = false;
  if(state.currentAudio){
    state.currentAudio.pause();
    state.currentAudio.currentTime = 0;
  }
  clearInterval(state.timer);
}

renderHome();
</script>
</body>
</html>
