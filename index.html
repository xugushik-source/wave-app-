<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Волна</title>

<style>
body{
margin:0;
background:#0E0E0D;
color:#EAE6DC;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
box-sizing:border-box;
}

.app{
width:100%;
max-width:430px;
}

.logo{
font-size:44px;
text-align:center;
margin-bottom:10px;
}

.title{
font-size:38px;
font-weight:700;
text-align:center;
margin-bottom:12px;
}

.subtitle{
text-align:center;
color:#9B9488;
line-height:1.6;
margin-bottom:30px;
}

.card{
background:#171715;
border-radius:26px;
padding:18px;
}

button{
width:100%;
padding:18px;
margin-bottom:12px;
border:none;
border-radius:18px;
background:#1F1E1A;
color:#EAE6DC;
font-size:16px;
font-weight:600;
}

button.primary{
background:#D6C3A3;
color:#111;
}

.player{
display:none;
margin-top:18px;
padding:18px;
border-radius:22px;
background:#12110F;
}

.player-title{
font-size:18px;
color:#D6C3A3;
margin-bottom:10px;
}

.current-text{
font-size:20px;
line-height:1.5;
margin-top:12px;
min-height:80px;
}

.status{
color:#8B8479;
font-size:13px;
}

.progress{
height:6px;
background:#2A2A28;
border-radius:999px;
overflow:hidden;
margin-top:18px;
}

.fill{
height:100%;
width:0%;
background:#D6C3A3;
transition:width .3s;
}

.notice{
margin-top:18px;
text-align:center;
font-size:12px;
color:#6E675C;
line-height:1.5;
}

.stop{
margin-top:12px;
background:#2A2A28;
}

.after{
display:none;
margin-top:16px;
padding:14px;
background:#1D1B17;
border-radius:16px;
color:#A59D90;
line-height:1.5;
}
</style>
</head>

<body>

<div class="app">

<div class="logo">🌊</div>

<div class="title">Волна</div>

<div class="subtitle">
Пауза между эмоцией<br>
и действием.
</div>

<div class="card">

<button class="primary" onclick="playScenario('no_reply')">
Он / она не отвечает
</button>

<button onclick="playScenario('want_write')">
Хочу написать сейчас
</button>

<button onclick="playScenario('not_loved')">
Меня не любят
</button>

<button onclick="playScenario('anger')">
Злюсь и хочу всё разрушить
</button>

<button onclick="playScenario('abandon')">
Страх, что меня бросят
</button>

<button onclick="playScenario('empty')">
Внутри пусто
</button>

<div class="player" id="player">

<div class="player-title" id="scenarioTitle">
Сценарий
</div>

<div class="status" id="status">
Подготовка...
</div>

<div class="current-text" id="currentText"></div>

<div class="progress">
<div class="fill" id="waveFill"></div>
</div>

<button class="stop" onclick="stopScenario()">
Остановить
</button>

<div class="after" id="afterText">
Волна стала тише. Сейчас не нужно ничего решать сразу.
</div>

</div>

</div>

<div class="notice">
Если звук не запускается — нажми сценарий ещё раз.
</div>

</div>

<script>

let playing = false;
let currentAudio = null;

const scenarios = {

no_reply: {
title: "Он / она не отвечает",
files: [
{ file: "anger_01.m4a", text: "Слушай… я понимаю, что тебя сейчас накрывает." },
{ file: "anger_02.m4a", text: "Кажется, что тебя игнорируют." },
{ file: "anger_03.m4a", text: "Кажется, что сейчас всё рушится." },
{ file: "anger_04.m4a", text: "Но давай честно… ты не знаешь, что происходит на той стороне." },
{ file: "anger_05.m4a", text: "Сейчас это чувство. Не факт." },
{ file: "anger_06.m4a", text: "Ты уже был в этом состоянии." },
{ file: "abandon_09.m4a", text: "И каждый раз оно проходило." },
{ file: "abandon_07.m4a", text: "Не пиши сейчас." },
{ file: "noanswer_02.m4a", text: "Дай этому двадцать минут." },
{ file: "abandon_08.m4a", text: "Я рядом." },
{ file: "anger_07.m4a", text: "Просто переждём это." }
]
},

want_write: {
title: "Хочу написать",
files: [
{ file: "anger_08.m4a", text: "Стоп." },
{ file: "abandon_01.m4a", text: "Сейчас не тот момент, когда стоит писать." },
{ file: "abandon_02.m4a", text: "Ты не хочешь решить проблему." },
{ file: "abandon_03.m4a", text: "Ты хочешь сбросить напряжение." },
{ file: "abandon_04.m4a", text: "И это нормально." },
{ file: "abandon_05.m4a", text: "Но если написать сейчас, может стать хуже." },
{ file: "abandon_06.m4a", text: "Ты это знаешь." },
{ file: "abandon_07.m4a", text: "Отложи телефон. Не пиши. Не звони." },
{ file: "noanswer_01.m4a", text: "Не навсегда." },
{ file: "noanswer_02.m4a", text: "Просто на двадцать минут." }
]
},

not_loved: {
title: "Меня не любят",
files: [
{ file: "noanswer_03.m4a", text: "Это чувство очень реальное." },
{ file: "noanswer_04.m4a", text: "Я понимаю." },
{ file: "noanswer_05.m4a", text: "Но это не значит, что тебя не любят." },
{ file: "noanswer_06.m4a", text: "Это значит, что тебе сейчас больно." },
{ file: "noanswer_07.m4a", text: "И страшно." },
{ file: "empty_01.m4a", text: "Твой мозг пытается объяснить это самым простым способом." },
{ file: "empty_02.m4a", text: "Но это не вся картина." },
{ file: "empty_03.m4a", text: "С тобой не что-то не так." },
{ file: "empty_04.m4a", text: "Ты просто сейчас в тяжёлом состоянии." },
{ file: "empty_05.m4a", text: "Оно пройдёт." }
]
},

anger: {
title: "Злость",
files: [
{ file: "empty_06.m4a", text: "Я вижу, как тебя сейчас злит." },
{ file: "write_01.m4a", text: "И это нормально." },
{ file: "write_02.m4a", text: "Злость не делает тебя плохим." },
{ file: "write_03.m4a", text: "Она просто очень сильная." },
{ file: "write_04.m4a", text: "Но если действовать сейчас…" },
{ file: "write_05.m4a", text: "Ты можешь разрушить то, что потом захочешь вернуть." },
{ file: "write_06.m4a", text: "Давай не решать ничего сейчас." },
{ file: "write_07.m4a", text: "Просто переживём пик." }
]
},

abandon: {
title: "Страх, что меня бросят",
files: [
{ file: "write_08.m4a", text: "Сейчас тебе кажется, что это конец." },
{ file: "write_09.m4a", text: "Что тебя бросят." },
{ file: "write_10.m4a", text: "Что ты останешься один." },
{ file: "write_11.m4a", text: "Это очень сильное чувство." },
{ file: "write_12.m4a", text: "Я понимаю." },
{ file: "write_13.m4a", text: "Но оно сейчас громче реальности." },
{ file: "write_14.m4a", text: "Прямо сейчас ты здесь." }
]
},

empty: {
title: "Пустота",
files: [
{ file: "write_15.m4a", text: "Сейчас внутри может быть пусто." },
{ file: "write_16.m4a", text: "Как будто ничего нет." },
{ file: "write_17.m4a", text: "Но это не ты." },
{ file: "write_18.m4a", text: "Это состояние." },
{ file: "write_19.m4a", text: "Оно приходит." },
{ file: "write_20.m4a", text: "И оно уходит." }
]
}

};

async function playScenario(key){

const scenario = scenarios[key];

if(!scenario) return;

stopScenario(false);

playing = true;

document.getElementById("player").style.display = "block";

document.getElementById("afterText").style.display = "none";

document.getElementById("scenarioTitle").innerText =
scenario.title;

document.getElementById("waveFill").style.width = "0%";

document.getElementById("status").innerText =
"Запускаю голос...";

document.getElementById("currentText").innerText = "";

for(let i = 0; i < scenario.files.length; i++){

if(!playing) break;

const item = scenario.files[i];

document.getElementById("status").innerText =
"Фраза " + (i + 1) + " из " + scenario.files.length;

document.getElementById("currentText").innerText =
item.text;

document.getElementById("waveFill").style.width =
(((i + 1) / scenario.files.length) * 100) + "%";

currentAudio = new Audio(item.file);

await new Promise(resolve => {
currentAudio.onended = resolve;
currentAudio.onerror = resolve;
currentAudio.play().catch(resolve);
});

await new Promise(resolve =>
setTimeout(resolve, 700)
);

}

if(playing){

document.getElementById("status").innerText =
"Волна стала тише.";

document.getElementById("afterText").style.display =
"block";

}

playing = false;

}

function stopScenario(show=true){

playing = false;

if(currentAudio){
currentAudio.pause();
currentAudio.currentTime = 0;
}

if(show){
document.getElementById("status").innerText =
"Остановлено";
}

}

</script>

</body>
</html>
